<h2>Доктор</h2>

<section class="form-section">
    <h3>Обновить статус визита</h3>
    <form id="update-visit-form">
        <input type="text" id="visitId" placeholder="UUID визита" required />
        <button type="button" id="startBtn">Начать визит</button>
        <button type="button" id="finishBtn">Завершить визит</button>
    </form>
</section>

<section>
    <h3>Список визитов</h3>
    <table id="visits-table" border="1">
        <thead>
        <tr><th>Id</th><th>Имя</th><th>Фамилия</th><th>Статус</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</section>
