<h2>Регистратура</h2>

<section class="form-section">
    <h3>Создание пациента</h3>
    <form id="create-patient-form">
        <input type="text" id="firstName" placeholder="Имя" required />
        <input type="text" id="lastName" placeholder="Фамилия" required />
        <input type="date" id="birthDate" required />
        <button type="submit">Создать пациента</button>
    </form>
</section>

<section class="form-section">
    <h3>Удаление пациента</h3>
    <form id="delete-patient-form">
        <input type="text" id="patientId" placeholder="UUID пациента" required />
        <button type="submit">Удалить пациента</button>
    </form>
</section>
