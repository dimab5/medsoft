<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSoftMeet — Телеконсультация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<div id="connectionScreen" class="screen screen--login">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" fill="var(--accent)"/>
                <path d="M20 10v20M10 20h20" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
            <span>MedSoftMeet</span>
        </div>
        <h1 class="login-title">Телеконсультация</h1>
        <p class="login-sub">Введите идентификаторы участников для подключения</p>

        <div class="field">
            <label for="userId">Ваш ID</label>
            <input type="text" id="userId" class="input" placeholder="например: doctor_1" value="user1" autocomplete="off">
        </div>
        <div class="field">
            <label for="remoteUserId">ID собеседника</label>
            <input type="text" id="remoteUserId" class="input" placeholder="например: patient_1" value="user2" autocomplete="off">
        </div>

        <div class="devices-section">
            <button class="devices-toggle" onclick="toggleLoginDevices(this)" type="button">
                <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                Настройки устройств
                <svg class="toggle-arrow" viewBox="0 0 12 12" fill="none" style="transition:transform 0.2s"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="devices-body" id="devicesBody">
                <div class="field">
                    <label for="videoDeviceSelect">📹 Камера</label>
                    <select id="videoDeviceSelect" class="input"></select>
                </div>
                <div class="field">
                    <label for="audioDeviceSelect">🎤 Микрофон</label>
                    <select id="audioDeviceSelect" class="input"></select>
                </div>
            </div>
        </div>

        <button onclick="connect()" class="btn-connect">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zM7 9l2.5 2.5L14 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Начать конференцию
        </button>

        <div class="login-hint">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v4M8 5.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Для подключения с другого устройства используйте ngrok или LAN-адрес сервера
        </div>
    </div>
</div>

<div id="conferenceScreen" class="screen screen--conf" style="display:none">

    <header class="conf-header">
        <div class="conf-logo">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="var(--accent)" stroke-width="2"/><path d="M12 6v12M6 12h12" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/></svg>
            MedSoftMeet
        </div>
        <div class="conf-status-bar">
            <div class="status-dot"></div>
            <span id="connectionStatus">Подключение...</span>
        </div>
        <button onclick="endCall()" class="btn-end-header">
            <svg viewBox="0 0 20 20" fill="none"><path d="M2 10c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 10.5a1.5 1.5 0 011.5-1.5h.5a1.5 1.5 0 011.5 1.5v2a1.5 1.5 0 01-1.5 1.5h-.5A1.5 1.5 0 017 12.5v-2z" stroke="currentColor" stroke-width="2"/></svg>
            Завершить
        </button>
    </header>

    <main class="conf-main">
        <section class="video-section">
            <div class="video-tile video-tile--local">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="tile-overlay tile-overlay--top">
                    <span class="tile-name">Я · <span id="localId"></span></span>
                    <div class="tile-badges">
                        <span id="videoIndicator" class="tile-badge" title="Видео">📹</span>
                        <span id="audioIndicator" class="tile-badge" title="Микрофон">🎤</span>
                        <span id="screenIndicator" class="tile-badge tile-badge--hidden" title="Демонстрация">🖥️</span>
                    </div>
                </div>
                <div class="tile-controls">
                    <button id="toggleVideoBtn" onclick="toggleVideo()" class="ctrl-btn" title="Видео">
                        <span class="ctrl-icon">📹</span><span class="ctrl-label">Видео</span>
                    </button>
                    <button id="toggleAudioBtn" onclick="toggleAudio()" class="ctrl-btn" title="Микрофон">
                        <span class="ctrl-icon">🎤</span><span class="ctrl-label">Микрофон</span>
                    </button>
                    <button id="screenShareBtn" onclick="toggleScreenShare()" class="ctrl-btn" title="Демонстрация">
                        <span class="ctrl-icon">🖥️</span><span class="ctrl-label">Экран</span>
                    </button>
                    <div class="settings-wrap">
                        <button id="settingsBtn" onclick="toggleSettings()" class="ctrl-btn" title="Устройства">
                            <span class="ctrl-icon">⚙️</span><span class="ctrl-label">Устройства</span>
                        </button>
                        <div id="settingsPanel" class="settings-panel">
                            <div class="settings-panel__header">Устройства</div>
                            <div class="settings-panel__field">
                                <label>📹 Камера</label>
                                <select id="callVideoSelect" class="settings-select"></select>
                            </div>
                            <div class="settings-panel__field">
                                <label>🎤 Микрофон</label>
                                <select id="callAudioSelect" class="settings-select"></select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="video-tile video-tile--remote">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="tile-overlay tile-overlay--top">
                    <span class="tile-name">Собеседник · <span id="remoteId"></span></span>
                    <span id="remoteStatus" class="remote-status-badge"></span>
                </div>
                <div class="tile-overlay tile-overlay--bottom">
                    <div class="volume-row">
                        <span class="vol-icon">🔊</span>
                        <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="1"
                               oninput="setVolume(this.value)" class="vol-slider">
                        <span id="volumeValue" class="vol-val">100%</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="chat-sidebar">
            <div class="chat-top">
                <h2 class="chat-heading">Сообщения</h2>
            </div>
            <div class="messages" id="messages"></div>
            <div class="chat-compose">
                <input type="text" id="messageInput" class="compose-input" placeholder="Написать сообщение...">
                <button onclick="sendMessage()" class="compose-send" title="Отправить">
                    <svg viewBox="0 0 20 20" fill="none"><path d="M18 10L2 3l4 7-4 7 16-7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </aside>
    </main>
</div>

<div id="notificationArea" class="notification-area"></div>

<script src="/js/script.js"></script>
<script>
	function toggleLoginDevices(btn) {
		const body  = document.getElementById('devicesBody');
		const arrow = btn.querySelector('.toggle-arrow');
		const open  = body.classList.toggle('devices-body--open');
		arrow.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
	}
</script>
</body>
</html>
